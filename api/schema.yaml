                    format: binary
      responses:
        "201":
          description: Album imported.
        "400":
          description: Invalid files or metadata.
        "401":
          description: Missing or invalid bearer token.
        "403":
          description: Requires admin privileges.
        "409":
          description: Album already imported.
      security:
        - bearer: []
      tags:
        - Admin
  /admin/albums/{id}:
    delete:
      operationId: AdminController_deleteAlbum
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "204":
          description: ""
        "401":
          description: Missing or invalid bearer token.
        "403":
          description: Requires admin privileges.
        "404":
          description: Album not found.
      security:
        - bearer: []
      tags:
        - Admin
  /interactions:
    get:
      operationId: InteractionsController_findAll
      parameters:
        - name: limit
          required: false
          in: query
          schema:
            minimum: 1
            maximum: 50
            default: 20
            type: number
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                    - $ref: "#/components/schemas/ArtistInteractionEntity"
                    - $ref: "#/components/schemas/PlaylistInteractionEntity"
                    - $ref: "#/components/schemas/AlbumInteractionEntity"
                  discriminator:
                    propertyName: type
                    mapping:
                      artist: "#/components/schemas/ArtistInteractionEntity"
                      playlist: "#/components/schemas/PlaylistInteractionEntity"
                      album: "#/components/schemas/AlbumInteractionEntity"
        "400":
          description: Invalid query parameters.
        "401":
          description: Missing or invalid bearer token.
      security:
        - bearer: []
      tags:
        - Interactions
  /interactions/albums/{id}:
    post:
      operationId: InteractionsController_createOrUpdateAlbum
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "204":
          description: ""
        "401":
          description: Missing or invalid bearer token.
        "404":
          description: Album not found.
      security:
        - bearer: []
      tags:
        - Interactions
  /interactions/artists/{id}:
    post:
      operationId: InteractionsController_createOrUpdateArtist
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "204":
          description: ""
        "401":
          description: Missing or invalid bearer token.
        "404":
          description: Artist not found.
      security:
        - bearer: []
      tags:
        - Interactions
  /interactions/playlists/{id}:
    post:
      operationId: InteractionsController_createOrUpdatePlaylist
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "204":
          description: ""
        "401":
          description: Missing or invalid bearer token.
        "404":
          description: Playlist not found.
      security:
        - bearer: []
      tags:
        - Interactions
  /library:
    get:
      operationId: LibraryController_findAll
      parameters:
        - name: type
          required: false
          in: query
          schema:
            $ref: "#/components/schemas/LibraryItemType"
        - name: limit
          required: false
          in: query
          schema:
            minimum: 1
            maximum: 200
            default: 100
            type: number
        - name: offset
          required: false
          in: query
          schema:
            minimum: 0
            default: 0
            type: number
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                    - $ref: "#/components/schemas/ArtistLibraryItemEntity"
                    - $ref: "#/components/schemas/PlaylistLibraryItemEntity"
                    - $ref: "#/components/schemas/AlbumLibraryItemEntity"
                  discriminator:
                    propertyName: type
                    mapping:
                      artist: "#/components/schemas/ArtistLibraryItemEntity"
                      playlist: "#/components/schemas/PlaylistLibraryItemEntity"
                      album: "#/components/schemas/AlbumLibraryItemEntity"
        "400":
          description: Invalid query parameters.
        "401":
          description: Missing or invalid bearer token.
      security:
        - bearer: []
      tags:
        - Library
info:
  title: Castaway
  description: The API documentation
  version: "0.1"
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    UserEntity:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        userName:
          type: string
        isAdmin:
          type: boolean
      required:
        - id
        - email
        - userName
        - isAdmin
    DeviceDto:
      type: object
      properties:
        clientId:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 120
        model:
          type: string
          maxLength: 120
      required:
        - clientId
    LoginDto:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          format: password
          minLength: 12
        deviceInfo:
          $ref: "#/components/schemas/DeviceDto"
      required:
        - email
        - password
        - deviceInfo
    AuthTokensEntity:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
      required:
        - accessToken
        - refreshToken
    SignUpDto:
      type: object
      properties:
        userName:
          type: string
          minLength: 1
          maxLength: 32
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          format: password
          minLength: 12
        deviceInfo:
          $ref: "#/components/schemas/DeviceDto"
      required:
        - userName
        - email
        - password
        - deviceInfo
    RefreshTokenDto:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken
    CreateWhitelistEntryDto:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        note:
          type: string
          maxLength: 200
      required:
        - email
    WhitelistEntryEntity:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        note:
          type: string
          nullable: true
        createdAt:
          format: date-time
          type: string
        updatedAt:
          format: date-time
          type: string
      required:
        - id
        - email
        - note
        - createdAt
        - updatedAt
    UpdateWhitelistEntryDto:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        note:
          type: string
          maxLength: 200
    TrackSortOrder:
      type: string
      enum:
        - title
        - album
        - year
        - added
    SortDirection:
      type: string
      enum:
        - asc
        - desc
    AlbumRef:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
      required:
        - id
        - title
    ArtistRef:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        isVarious:
          type: boolean
      required:
        - id
        - name
        - isVarious
    TrackSummaryEntity:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        genres:
          type: array
          items:
            type: string
        duration:
          type: number
        releaseDate:
          format: date-time
          type: string
        trackNumber:
          type: number
        starred:
          type: boolean
        album:
          $ref: "#/components/schemas/AlbumRef"
        artists:
          type: array
          items:
            $ref: "#/components/schemas/ArtistRef"
      required:
        - id
        - title
        - genres
        - duration
        - releaseDate
        - trackNumber
        - starred
        - album
        - artists
    TrackEntity:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        genres:
          type: array
          items:
            type: string
        duration:
          type: number
        releaseDate:
          format: date-time
          type: string
        trackNumber:
          type: number
        discNumber:
          type: number
        size:
          type: number
        album:
          $ref: "#/components/schemas/AlbumRef"
        artists:
          type: array
          items:
            $ref: "#/components/schemas/ArtistRef"
        starred:
          type: boolean
      required:
        - id
        - title
        - genres
        - duration
        - releaseDate
        - trackNumber
        - discNumber
        - size
        - album
        - artists
        - starred
    PlaylistSortOrder:
      type: string
      enum:
        - name
        - added
    PlaylistType:
      type: number
      enum:
        - USER: USER
          LIKED: LIKED
    PlaylistSummaryEntity:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          allOf:
            - $ref: "#/components/schemas/PlaylistType"
        albumCoverUrls:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - type
        - albumCoverUrls
    PlaylistEntity:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        ownerId:
          type: string
        type:
          allOf:
            - $ref: "#/components/schemas/PlaylistType"
        albumCoverUrls:
          type: array
          items:
            type: string
      required:
        - id
        - name
        - description
        - ownerId
        - type
        - albumCoverUrls
    CreatePlaylistDto:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
      required:
        - name
    PlaylistRef:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name
    PlaylistTrackEntity:
      type: object
      properties:
        id:
          type: string
        trackId:
          type: string
        genres:
          type: array
          items:
            type: string
        duration:
          type: number
        trackNumber:
          type: number
        discNumber:
          type: number
        title:
          type: string
        album:
          $ref: "#/components/schemas/AlbumRef"
        artists:
          type: array
          items:
            $ref: "#/components/schemas/ArtistRef"
      required:
        - id
        - trackId
        - genres
        - duration
        - trackNumber
        - discNumber
        - title
        - album
        - artists
    AlbumSortOrder:
      type: string
      enum:
        - title
        - year
        - added
    AlbumSummaryEntity:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        releaseDate:
          format: date-time
          type: string
        genres:
          type: array
          items:
            type: string
        artists:
          type: array
          items:
            $ref: "#/components/schemas/ArtistRef"
        starred:
          type: boolean
      required:
        - id
        - title
        - releaseDate
        - genres
        - artists
        - starred
    AlbumTrackEntity:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        genres:
          type: array
          items:
            type: string
        duration:
          type: number
        trackNumber:
          type: number
        discNumber:
          type: number
        album:
          $ref: "#/components/schemas/AlbumRef"
        artists:
          type: array
          items:
            $ref: "#/components/schemas/ArtistRef"
      required:
        - id
        - title
        - genres
        - duration
        - trackNumber
        - discNumber
        - album
        - artists
    AlbumEntity:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        releaseDate:
          format: date-time
          type: string
        compilation:
          type: boolean
        genres:
          type: array
          items:
            type: string
        starred:
          type: boolean
        artists:
          type: array
          items:
            $ref: "#/components/schemas/ArtistRef"
        tracks:
          type: array
          items:
            $ref: "#/components/schemas/AlbumTrackEntity"
      required:
        - id
        - title
        - releaseDate
        - compilation
        - genres
        - starred
        - artists
        - tracks
    ArtistSortOrder:
      type: string
      enum:
        - name
    ArtistSummaryEntity:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        starred:
          type: boolean
        isVarious:
          type: boolean
      required:
        - id
        - name
        - starred
        - isVarious
    ArtistEntity:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        bio:
          type: string
          nullable: true
        starred:
          type: boolean
        albums:
          type: array
          items:
            $ref: "#/components/schemas/AlbumRef"
        isVarious:
          type: boolean
          description: >-
            True for the synthetic "Various Artists" credit; display-only, so its
            detail page is unreachable (the client bounces back).
      required:
        - id
        - name
        - bio
        - starred
        - albums
        - isVarious
    SearchResultsEntity:
      type: object
      properties:
        albums:
          type: array
          items:
            $ref: "#/components/schemas/AlbumSummaryEntity"
        artists:
          type: array
          items:
            $ref: "#/components/schemas/ArtistSummaryEntity"
        tracks:
          type: array
          items:
            $ref: "#/components/schemas/TrackSummaryEntity"
      required:
        - albums
        - artists
        - tracks
    InteractionTypeArtist:
      type: string
      enum:
        - artist
    ArtistInteractionEntity:
      type: object
      properties:
        type:
          allOf:
            - $ref: "#/components/schemas/InteractionTypeArtist"
        id:
          type: string
        updatedAt:
          format: date-time
          type: string
        artist:
          $ref: "#/components/schemas/ArtistRef"
        coverUrl:
          type: string
          nullable: true
      required:
        - type
        - id
        - updatedAt
        - artist
        - coverUrl
    InteractionTypePlaylist:
      type: string
      enum:
        - playlist
    PlaylistInteractionEntity:
      type: object
      properties:
        type:
          allOf:
            - $ref: "#/components/schemas/InteractionTypePlaylist"
        id:
          type: string
        updatedAt:
          format: date-time
          type: string
        playlist:
          $ref: "#/components/schemas/PlaylistRef"
        coverUrls:
          type: array
          items:
            type: string
        playlistType:
          allOf:
            - $ref: "#/components/schemas/PlaylistType"
      required:
        - type
        - id
        - updatedAt
        - playlist
        - coverUrls
        - playlistType
    InteractionTypeAlbum:
      type: string
      enum:
        - album
    AlbumInteractionEntity:
      type: object
      properties:
        type:
          allOf:
            - $ref: "#/components/schemas/InteractionTypeAlbum"
        id:
          type: string
        updatedAt:
          format: date-time
          type: string
        album:
          $ref: "#/components/schemas/AlbumRef"
        artists:
          type: array
          items:
            $ref: "#/components/schemas/ArtistRef"
        coverUrl:
          type: string
          nullable: true
      required:
        - type
        - id
        - updatedAt
        - album
        - artists
        - coverUrl
    LibraryItemTypeArtist:
      type: string
      enum:
        - artist
    ArtistLibraryItemEntity:
      type: object
      properties:
        type:
          allOf:
            - $ref: "#/components/schemas/LibraryItemTypeArtist"
        artist:
          $ref: "#/components/schemas/ArtistRef"
        coverUrl:
          type: string
          nullable: true
        lastInteractedAt:
          format: date-time
          type: string
          nullable: true
      required:
        - type
        - artist
        - coverUrl
        - lastInteractedAt
    LibraryItemTypePlaylist:
      type: string
      enum:
        - playlist
    PlaylistLibraryItemEntity:
      type: object
      properties:
        type:
          allOf:
            - $ref: "#/components/schemas/LibraryItemTypePlaylist"
        playlist:
          $ref: "#/components/schemas/PlaylistRef"
        coverUrls:
          type: array
          items:
            type: string
        playlistType:
          allOf:
            - $ref: "#/components/schemas/PlaylistType"
        lastInteractedAt:
          format: date-time
          type: string
          nullable: true
      required:
        - type
        - playlist
        - coverUrls
        - playlistType
        - lastInteractedAt
    LibraryItemTypeAlbum:
      type: string
      enum:
        - album
    AlbumLibraryItemEntity:
      type: object
      properties:
        type:
          allOf:
            - $ref: "#/components/schemas/LibraryItemTypeAlbum"
        album:
          $ref: "#/components/schemas/AlbumRef"
        artists:
          type: array
          items:
            $ref: "#/components/schemas/ArtistRef"
        coverUrl:
          type: string
          nullable: true
        lastInteractedAt:
          format: date-time
          type: string
          nullable: true
      required:
        - type
        - album
        - artists
        - coverUrl
        - lastInteractedAt
    LibraryItemType:
      type: string
      enum:
        - album
        - artist
        - playlist
