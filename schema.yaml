info:
  title: Castaway
  description: The API documentation
  version: '0.1'
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    DeviceInfoDto:
      type: object
      properties:
        clientId:
          type: string
        name:
          type: string
        model:
          type: string
      required:
        - clientId
        - name
        - model
    LoginDto:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        deviceInfo:
          $ref: '#/components/schemas/DeviceInfoDto'
      required:
        - email
        - password
        - deviceInfo
    SignUpDto:
      type: object
      properties:
        userName:
          type: string
        email:
          type: string
        password:
          type: string
        referralCode:
          type: string
        deviceInfo:
          $ref: '#/components/schemas/DeviceInfoDto'
      required:
        - userName
        - email
        - password
        - referralCode
        - deviceInfo
    RefreshTokenDto:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken
    PlaylistDto:
      type: object
      properties:
        name:
          type: string
      required:
        - name
    CreateArtistDto:
      type: object
      properties:
        name:
          type: string
      required:
        - name
